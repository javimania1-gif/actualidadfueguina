media:
  input: public/uploads
  output: /uploads
  rename: true
  categories: [image]

content:
  - name: borradores
    label: Borradores automáticos
    type: collection
    path: src/content/borradores
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{primary}.md"
      field: date
    view:
      primary: title
      fields: [date, category, location, sourceName, status]
      sort: detectedAt
      order: desc
    fields:
      - name: title
        label: Título detectado
        type: string
        required: true
      - name: description
        label: Resumen
        type: text
        required: true
      - name: date
        label: Fecha de la fuente
        type: date
        required: true
        options:
          time: true
      - name: category
        label: Categoría sugerida
        type: select
        required: true
        options:
          values: [Provincia, Río Grande, Ushuaia, Tolhuin, Malvinas, Antártida, Política, Economía, Sociedad, Policiales, Institucional]
      - name: location
        label: Ubicación
        type: string
      - name: sourceName
        label: Fuente detectada
        type: string
      - name: sourceUrl
        label: URL original
        type: string
      - name: originalImage
        label: Imagen original de referencia
        type: string
      - name: status
        label: Estado
        type: select
        options:
          values: [draft, review, approved]
      - name: detectedAt
        label: Detectado
        type: date
        options:
          time: true
      - name: mode
        label: Modo de ingreso
        type: string
      - name: body
        label: Material fuente para revisión
        type: rich-text
        options:
          format: markdown

  - name: noticias
    label: Noticias publicadas
    type: collection
    path: src/content/noticias
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{primary}.md"
      field: date
    view:
      primary: title
      fields: [date, category, location, featured, automated]
      sort: date
      order: desc
    fields:
      - name: title
        label: Título
        type: string
        required: true
      - name: description
        label: Bajada / descripción SEO
        type: text
        required: true
        options:
          minlength: 80
          maxlength: 180
      - name: date
        label: Fecha de publicación
        type: date
        required: true
        options:
          time: true
      - name: category
        label: Categoría
        type: select
        required: true
        options:
          values: [Provincia, Río Grande, Ushuaia, Tolhuin, Malvinas, Antártida, Política, Economía, Sociedad, Policiales, Institucional]
      - name: location
        label: Ubicación
        type: string
      - name: tags
        label: Etiquetas
        type: string
        list: true
      - name: image
        label: Imagen principal
        type: image
        options:
          media: public/uploads
      - name: imageAlt
        label: Texto alternativo de imagen
        type: string
      - name: author
        label: Autor
        type: string
      - name: featured
        label: Destacar en portada
        type: boolean
      - name: sourceName
        label: Fuente interna
        type: string
      - name: sourceUrl
        label: URL fuente interna
        type: string
      - name: automated
        label: Publicación automatizada
        type: boolean
      - name: dailyDigest
        label: Resumen diario
        type: boolean
      - name: body
        label: Cuerpo de la noticia
        type: rich-text
        required: true
        options:
          format: markdown
          media: public/uploads
          path: public/uploads
          rename: true
          switcher: true

settings:
  content:
    merge: true
