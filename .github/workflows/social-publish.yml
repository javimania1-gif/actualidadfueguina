name: Actualidad Fueguina - Publicación en Redes

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo simulación (no publica realmente)'
        type: boolean
        default: true
  schedule:
    # 3 veces al día (08:45, 15:45 y 22:45 de Tierra del Fuego / UTC-3)
    - cron: '45 11 * * *'
    - cron: '45 18 * * *'
    - cron: '45 1 * * *'

permissions:
  contents: write
  models: read

concurrency:
  group: actualidad-fueguina-social-publish
  cancel-in-progress: false

jobs:
  social-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AF_MODEL: openai/gpt-4o-mini
      META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
      META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
      META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
      META_GRAPH_API_VERSION: 'v25.0'

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar publicación social (Fase 1 - Reserva)
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ -z "${{ env.META_PAGE_ACCESS_TOKEN }}" ]; }; then
            echo "Modo DRY-RUN detectado, se salta reserva"
          else
            node scripts/social-publisher.mjs --reserve
          fi

      - name: Guardar reserva social en GitHub (Fase 1 - Commit)
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event_name != 'schedule' || env.META_PAGE_ACCESS_TOKEN != '') }}
        run: |
          git config user.name "Actualidad Fueguina Bot"
          git config user.email "bot@actualidadfueguina.com.ar"
          git add data/social-posts.json
          if ! git diff --cached --quiet; then
            git commit -m "Reserva social [skip ci]"
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
            git push origin main
          else
            echo "No hay nuevas reservas."
          fi

      - name: Ejecutar publicación social (Fase 2 - Preparación)
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ -z "${{ env.META_PAGE_ACCESS_TOKEN }}" ]; }; then
            echo "Modo DRY-RUN detectado, se salta preparación"
          else
            node scripts/social-publisher.mjs --prepare
          fi

      - name: Guardar preparación en GitHub (Fase 2 - Commit)
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event_name != 'schedule' || env.META_PAGE_ACCESS_TOKEN != '') }}
        run: |
          git config user.name "Actualidad Fueguina Bot"
          git config user.email "bot@actualidadfueguina.com.ar"
          git add data/social-posts.json
          if [ -d "public/uploads/social" ]; then
            git add public/uploads/social/
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Preparación social y placas [skip ci]"
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
            git push origin main
          else
            echo "Sin cambios en la preparación."
          fi

      - name: Ejecutar publicación social (Fase 3 - Publicación)
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ -z "${{ env.META_PAGE_ACCESS_TOKEN }}" ]; }; then
            echo "Ejecutando simulación DRY-RUN completa"
            node scripts/social-publisher.mjs --dry-run
          else
            node scripts/social-publisher.mjs --publish
          fi

      - name: Guardar cambios finales en GitHub (Fase 3 - Commit)
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event_name != 'schedule' || env.META_PAGE_ACCESS_TOKEN != '') }}
        run: |
          git config user.name "Actualidad Fueguina Bot"
          git config user.email "bot@actualidadfueguina.com.ar"
          git add data/social-posts.json
          if ! git diff --cached --quiet; then
            git commit -m "Publicación social completada [skip ci]"
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
            git push origin main
          else
            echo "Sin cambios finales que registrar."
          fi
