name: Actualidad Fueguina - Publicación en Redes

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo simulación (no publica realmente)'
        type: boolean
        default: true
  schedule:
    # 09:15, 12:45, 16:15, 20:45 de Tierra del Fuego (UTC-3)
    - cron: '15 12 * * *'
    - cron: '45 15 * * *'
    - cron: '15 19 * * *'
    - cron: '45 23 * * *'

permissions:
  contents: write
  models: read

concurrency:
  group: actualidad-fueguina-social-publish
  cancel-in-progress: false

jobs:
  social-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AF_MODEL: openai/gpt-4o-mini
      META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
      META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
      META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
      META_GRAPH_API_VERSION: ${{ vars.META_GRAPH_API_VERSION || secrets.META_GRAPH_API_VERSION }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: "[FASE 1] Reservar publicación"
        id: fase1
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          TOKEN="${{ secrets.META_PAGE_ACCESS_TOKEN }}"

          if [ "$DRY_RUN" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ -z "$TOKEN" ]; }; then
            echo "Ejecutando en modo DRY-RUN"
            node scripts/social-publisher.mjs --reserve --dry-run
          else
            node scripts/social-publisher.mjs --reserve
          fi

      - name: Persistir Reserva
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Actualidad Fueguina Bot"
          git config user.email "bot@actualidadfueguina.com.ar"
          git add data/social-posts.json
          if [ -d "public/uploads/social" ]; then git add public/uploads/social/; fi

          if ! git diff --cached --quiet; then
            git commit -m "Reserva de publicación social [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No hay nuevas reservas."
          fi

      - name: "[FASE 2] Ejecutar publicación"
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          TOKEN="${{ secrets.META_PAGE_ACCESS_TOKEN }}"

          if [ "$DRY_RUN" = "true" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ -z "$TOKEN" ]; }; then
            node scripts/social-publisher.mjs --publish --dry-run
          else
            node scripts/social-publisher.mjs --publish
          fi

      - name: Guardar Resultados Finales
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add data/social-posts.json
          if ! git diff --cached --quiet; then
            git commit -m "Resultados de publicación social [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "Sin cambios finales."
          fi
