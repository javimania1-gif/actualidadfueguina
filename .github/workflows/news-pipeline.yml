name: Actualidad Fueguina - Noticias automáticas

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "config/sources.json"
      - ".github/workflows/news-pipeline.yml"
      - "package.json"
      - "package-lock.json"
  schedule:
    # Cada 2 horas para sostener frescura sin forzar cuotas por corrida.
    - cron: '0 */2 * * *'

permissions:
  contents: write
  models: read

concurrency:
  group: actualidad-fueguina-news-pipeline
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GITHUB_TOKEN: ${{ github.token }}
      AF_MODEL: openai/gpt-4o-mini
      AF_AI_TIMEOUT_MS: '45000'
      AF_MAX_AI_PER_RUN: '16'
      AF_MAX_RETRY_ATTEMPTS: '3'
      AF_MAX_RESCUE_PER_RUN: '4'
      AF_MAX_PENDING_RECOVERY_PER_RUN: '4'
      AF_MAX_PENDING_CORROBORATION_ATTEMPTS: '4'
      AF_MAX_DRAFTS_PER_RUN: '10'
      AF_MAX_MATERIALIZE_PER_RUN: '48'
      AF_MAX_PER_SOURCE: '2'
      AF_TARGET_PUBLISHED_PER_RUN: '3'
      AF_MAX_NORMAL_PUBLISHED_PER_RUN: '4'
      AF_EXTRA_SLOT_MIN_IMPORTANCE: '8'
      AF_DAILY_TARGET_MIN: '12'
      AF_DAILY_TARGET_MAX: '16'
      AF_EXPECTED_RUNS_PER_DAY: '12'
      AF_MAX_CORROBORATION_SEARCHES: '3'
      AF_CORROBORATION_ITEMS_PER_SEARCH: '3'
      AF_SITE_URL: 'https://actualidadfueguina.com.ar'

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test

      - name: Preflight de fuentes
        continue-on-error: true
        run: npm run news:sources-health -- --quiet

      - name: Recolectar, redactar y clasificar
        run: npm run news:collect

      - name: Limpiar borradores viejos
        run: npm run news:cleanup

      - name: Verificar compilación
        run: npm run build

      - name: Guardar cambios
        id: guardar
        run: |
          git config user.name "Actualidad Fueguina Bot"
          git config user.email "bot@actualidadfueguina.com.ar"
          git add src/content/noticias src/content/borradores public/uploads/auto data/seen.json data/events.json data/sources-health.json data/news-run-metrics.json data/editorial-agenda.json data/news-rescue-queue.json

          if git diff --cached --quiet; then
            echo "No hay novedades para guardar."
            echo "urgent_added=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Detectar si se añadieron o modificaron líneas con 'urgent: true' en el diff staged
          if git diff --cached --unified=0 -- src/content/noticias | grep '^+.*urgent: true' > /dev/null; then
            echo "urgent_added=true" >> $GITHUB_OUTPUT
          else
            echo "urgent_added=false" >> $GITHUB_OUTPUT
          fi

          git commit -m "Actualización automática de noticias"

          # Guardar cambios residuales que el script pudo generar fuera de las rutas explícitas
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true

          git push origin main

      - name: Disparar publicación social inmediata si hay urgentes
        if: success() && steps.guardar.outputs.urgent_added == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Se detectó nueva noticia urgente en el commit actual. Disparando workflow social..."
          gh workflow run social-publish.yml -f dry_run=false
