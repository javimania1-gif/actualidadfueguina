name: Actualidad Fueguina - Noticias automáticas

on:
  workflow_dispatch:
  schedule:
    # 08:17, 11:47, 15:17, 18:47 y 22:17 de Tierra del Fuego (UTC-3)
    - cron: '17 11 * * *'
    - cron: '47 14 * * *'
    - cron: '17 18 * * *'
    - cron: '47 21 * * *'
    - cron: '17 1 * * *'

permissions:
  contents: write
  models: read

concurrency:
  group: actualidad-fueguina-news-pipeline
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AF_MODEL: openai/gpt-4o-mini
      AF_MAX_AI_PER_RUN: '6'
      AF_MAX_DRAFTS_PER_RUN: '8'

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Recolectar, redactar y clasificar
        run: npm run news:collect

      - name: Limpiar borradores viejos
        run: npm run news:cleanup

      - name: Verificar compilación
        run: npm run build

      - name: Guardar cambios
        run: |
          git config user.name "Actualidad Fueguina Bot"
          git config user.email "bot@actualidadfueguina.com.ar"
          git add src/content/noticias src/content/borradores public/uploads/auto data/seen.json
          if git diff --cached --quiet; then
            echo "No hay novedades para guardar."
            exit 0
          fi
          git commit -m "Actualización automática de noticias"
          git pull --rebase origin main
          git push origin main

      - name: Disparar publicación social inmediata si hay urgentes
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Detectar si se añadieron o modificaron líneas con 'urgent: true' en noticias en el último commit
          # Solo si hubo commit nuevo (evita disparar en runs sin cambios)
          if git rev-parse HEAD >/dev/null 2>&1; then
            FILES=$(git diff-tree --no-commit-id --name-only -r HEAD | grep 'src/content/noticias/' || true)
            if [ -n "$FILES" ]; then
              if git diff HEAD~1 HEAD -- $FILES | grep '^+.*urgent: true' > /dev/null; then
                echo "Se detectó nueva noticia urgente. Disparando workflow social..."
                gh workflow run social-publish.yml -f dry_run=false
              else
                echo "No hay noticias urgentes en este commit."
              fi
            else
              echo "No hay cambios en noticias."
            fi
          fi
