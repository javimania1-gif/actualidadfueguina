name: Actualidad Fueguina - Salud Social

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *' # Una vez al día

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Verificar Credenciales Meta
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        run: |
          if [ -z "$META_PAGE_ACCESS_TOKEN" ]; then echo "❌ Falta META_PAGE_ACCESS_TOKEN"; exit 1; fi
          if [ -z "$META_PAGE_ID" ]; then echo "❌ Falta META_PAGE_ID"; exit 1; fi
          if [ -z "$META_IG_USER_ID" ]; then echo "❌ Falta META_IG_USER_ID"; exit 1; fi

          VERSION=${META_GRAPH_API_VERSION:-v21.0}
          echo "Consultando Graph API ($VERSION)..."
          RES=$(curl -s "https://graph.facebook.com/$VERSION/$META_PAGE_ID?fields=name,has_added_app&access_token=$META_PAGE_ACCESS_TOKEN")
          echo "$RES" | grep -q "name" || (echo "❌ Error en token o ID: $RES"; exit 1)
          echo "✅ Facebook OK: $(echo $RES | jq -r .name)"

          RES_IG=$(curl -s "https://graph.facebook.com/$VERSION/$META_IG_USER_ID?fields=username&access_token=$META_PAGE_ACCESS_TOKEN")
          echo "$RES_IG" | grep -q "username" || (echo "❌ Error en Instagram ID: $RES_IG"; exit 1)
          echo "✅ Instagram OK: $(echo $RES_IG | jq -r .username)"
